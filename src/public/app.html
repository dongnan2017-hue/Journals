<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Journal</title>
  <meta name="theme-color" content="#8b6f47">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <nav class="tabs">
      <button class="tab" data-view="write">Write</button>
      <button class="tab" data-view="read">Read</button>
    </nav>
    <div class="spacer"></div>
    <span id="role-label" class="muted"></span>
    <a id="print-btn" href="/print" target="_blank" title="Export entries as PDF">Print</a>
    <button id="backup-btn" title="Download a zip backup">Backup</button>
    <button id="logout">Log out</button>
  </header>

  <main id="write" class="view">
    <div class="write-toolbar">
      <label>Date
        <input type="date" id="date-picker">
      </label>
      <span id="save-status" class="muted"></span>
    </div>

    <section id="on-this-day" class="otd hidden">
      <h3>On this day</h3>
      <div id="otd-list"></div>
    </section>

    <div id="editor-container">
      <div id="editor"></div>
    </div>
    <input type="file" id="photo-input" accept="image/*" multiple hidden>
  </main>

  <dialog id="resize-dialog" class="resize-dialog">
    <form method="dialog" class="resize-form">
      <h3>Resize photo before upload</h3>
      <div class="resize-preview" id="resize-preview">
        <img id="resize-preview-img" alt="">
        <div class="resize-handle" id="resize-handle" title="Drag to resize (or scroll)"></div>
      </div>
      <div class="muted resize-hint">Scroll or drag the corner to resize</div>
      <label>Max dimension: <span id="resize-dim-label">2048</span>px
        <input type="range" id="resize-dim" min="512" max="4096" step="256" value="2048">
      </label>
      <label>Quality: <span id="resize-quality-label">85</span>%
        <input type="range" id="resize-quality" min="50" max="100" step="5" value="85">
      </label>
      <div class="resize-info">
        Original: <span id="resize-original-size">–</span>
        &nbsp;→&nbsp;
        New: <span id="resize-output-size">calculating…</span>
      </div>
      <div class="resize-actions">
        <button type="button" id="resize-cancel">Cancel</button>
        <button type="button" id="resize-upload" class="primary">Upload</button>
      </div>
    </form>
  </dialog>

  <main id="read" class="view hidden">
    <div class="read-toolbar">
      <input type="search" id="search" placeholder="Search your entries…" autocomplete="off">
      <button id="random-btn" title="Jump to a random entry">🎲 Random</button>
      <select id="tag-filter" title="Filter by tag">
        <option value="">All tags</option>
      </select>
    </div>
    <div id="timeline"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  <script src="/static/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
